<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Proxy mduyk~</title>

<!-- FIX KHÔNG ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #020617, #000);
    color: white;
    overflow-x: hidden;
}

/* LOGIN OVERLAY */
.auth {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
}

/* LOGIN BOX */
.auth-box {
    background: #1e293b;
    padding: 35px;
    width: 420px;
    max-width: 92%;
    border-radius: 20px;
    text-align: center;

    animation: float 4s ease-in-out infinite;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px; /* FIX KHÔNG ZOOM IPHONE */
}

/* BUTTON */
button {
    background: #22c55e;
    border: none;
    padding: 12px;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    font-size: 15px;
}

button:hover {
    background: #16a34a;
}

/* SHOP */
#shop {
    display: none;
}

h1 {
    text-align: center;
    margin: 15px 0;
}

/* GRID KHÔNG DƯ */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 15px;
    max-width: 900px;
    margin: auto;
}

/* BOX SHOP */
.box {
    background: #1e293b;
    padding: 15px;
    border-radius: 18px;
    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;

    min-height: 140px;

    animation: float 4s ease-in-out infinite;
}

.box:hover {
    transform: scale(1.05);
}

/* TITLE */
.box h3 {
    margin: 0;
    font-size: 16px;
}

/* PRICE */
.price {
    color: #22c55e;
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}

/* FLOAT NHẸ LÊN XUỐNG */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

/* SAO */
.star {
    position: fixed;
    top: -10px;
    z-index: 0;
    animation: fall linear infinite, spin 3s linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

@keyframes spin {
    from { rotate: 0deg; }
    to { rotate: 360deg; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="auth" id="auth">
    <div class="auth-box">
        <h2>Đăng ký</h2>
        <input id="regUser" placeholder="Tài khoản">
        <input id="regPass" type="password" placeholder="Mật khẩu">
        <button onclick="register()">Đăng ký</button>

        <h2>Đăng nhập</h2>
        <input id="logUser" placeholder="Tài khoản">
        <input id="logPass" type="password" placeholder="Mật khẩu">
        <button onclick="login()">Đăng nhập</button>
    </div>
</div>

<!-- SHOP -->
<div id="shop">
    <h1>🛒 Shop Proxy mduyk~</h1>

    <div class="container"

        <div class="box">
            <h3>Proxy 2Tuần</h3>
            <div class="price">80.000đ</div>
            <button onclick="buy('Proxy Tuần',80.000)">Mua ngay</button>
        </div>

        <div class="box">
            <h3>Proxy Tháng</h3>
            <div class="price">150.000đ</div>
            <button onclick="buy('Proxy Tháng',150.000)">Mua ngay</button>
        </div>
        
        <div class="box">
            <h3>Proxy 2tháng</h3>
            <div class="price">200.000đ</div>
            <button onclick="buy('Proxy Ngày',200.000)">Mua ngay</button>
        </div>
        
        <div class="box">
            <h3>Proxy 3tháng</h3>
            <div class="price">250.000đ</div>
            <button onclick="buy('Proxy Ngày',250.000)">Mua ngay</button>
        </div>

        <div class="box">
            <h3>Proxy Vĩnh viễn</h3>
            <div class="price">600.000đ</div>
            <button onclick="buy('Proxy Vĩnh viễn',600.000)">Mua ngay</button>
        </div>
    </div>
</div>

<script>
// REGISTER
function register(){
    let u = regUser.value;
    let p = regPass.value;

    if(u && p){
        localStorage.setItem("user", u);
        localStorage.setItem("pass", p);
        alert("Đăng ký thành công!");
    } else {
        alert("Nhập đủ thông tin!");
    }
}

// LOGIN
function login(){
    let u = logUser.value;
    let p = logPass.value;

    if(u === localStorage.getItem("user") &&
       p === localStorage.getItem("pass")){
        document.getElementById("auth").style.display = "none";
        document.getElementById("shop").style.display = "block";
    } else {
        alert("Sai tài khoản!");
    }
}

// BUY
function buy(name, price){
    localStorage.setItem("product", name);
    localStorage.setItem("price", price);
    window.location.href = "pay.html";
}

// SAO
setInterval(()=>{
    let s = document.createElement("div");
    s.className = "star";
    s.innerHTML = "⭐";

    s.style.left = Math.random()*100+"vw";
    s.style.fontSize = (10+Math.random()*15)+"px";
    s.style.animationDuration = (5+Math.random()*5)+"s";

    document.body.appendChild(s);
    setTimeout(()=>s.remove(),10000);
},120);
</script>

</body>
</html>
